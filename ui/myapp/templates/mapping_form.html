{% extends "base.html" %}
{% block content %}
<section class="page-heading"><div><p class="eyebrow">OBJECT STORAGE ROUTING</p><h1>{{ form_mode }} resource mapping</h1><p>All fields are required. The destination database and table must be valid MySQL identifiers.</p></div></section>
<section class="content-card"><form method="post" class="form-grid mapping-form"><label>Compartment name <span>*</span><input name="compartment_name" maxlength="255" required value="{{ mapping.compartment_name or '' }}" placeholder="HWDemo"><small>OCI compartment display name.</small></label><label>Bucket name <span>*</span><input name="bucket_name" maxlength="255" required value="{{ mapping.bucket_name or '' }}" placeholder="ivanma-bucket"><small>Object Storage bucket name.</small></label><label class="wide">Resource name pattern <span>*</span><input name="resource_name_pattern" maxlength="1024" required value="{{ mapping.resource_name_pattern or '' }}" placeholder="myfolder/emp*.csv"><small>Shell-style pattern matched against the resource name.</small></label><label>Target database <span>*</span><select id="target-database" name="target_database" required><option value="">Select database</option>{% for database in target_databases %}<option value="{{ database }}" {{ 'selected' if database == mapping.target_database else '' }}>{{ database }}</option>{% endfor %}</select><small>Only databases available to this connection are listed.</small></label><label>Target table <span>*</span><select id="target-table" name="target_table" required {% if not mapping.target_database %}disabled{% endif %}><option value="">Select table</option>{% for table in target_tables %}<option value="{{ table }}" {{ 'selected' if table == mapping.target_table else '' }}>{{ table }}</option>{% endfor %}</select><small>Tables are loaded from the selected database.</small></label><div class="form-actions mapping-actions"><a class="secondary-button" href="{{ url_for('mappings.list_mappings') }}">Cancel</a><button class="primary-button" type="submit">{{ form_mode }} mapping</button></div></form></section>
{% endblock %}
{% block scripts %}
<script>
const database = document.querySelector('#target-database');
const table = document.querySelector('#target-table');
database.addEventListener('change', async () => {
  table.innerHTML = '<option value="">Select table</option>';
  table.disabled = !database.value;
  if (!database.value) return;
  const response = await fetch(`{{ url_for('mappings.target_tables') }}?database=${encodeURIComponent(database.value)}`);
  const payload = response.ok ? await response.json() : {tables: []};
  payload.tables.forEach((name) => {
    const option = document.createElement('option');
    option.value = name;
    option.textContent = name;
    table.appendChild(option);
  });
});
</script>
{% endblock %}
