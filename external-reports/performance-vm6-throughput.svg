<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" role="img" aria-labelledby="title desc">
  <title id="title">Primary workload throughput</title>
  <desc id="desc">Throughput rises from 5.914 MiB per second at 10 MiB and remains around 14.9 MiB per second from 500 MiB through 5 GiB.</desc>
  <rect width="900" height="440" rx="12" fill="#ffffff"/>
  <text x="54" y="32" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#152b3a">Primary workload throughput</text>
  <g stroke="#dce5ea" stroke-width="1">
    <line x1="72" y1="340" x2="850" y2="340"/><line x1="72" y1="270" x2="850" y2="270"/>
    <line x1="72" y1="200" x2="850" y2="200"/><line x1="72" y1="130" x2="850" y2="130"/><line x1="72" y1="60" x2="850" y2="60"/>
  </g>
  <g fill="#62717c" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">
    <text x="62" y="344">0</text><text x="62" y="274">4</text><text x="62" y="204">8</text><text x="62" y="134">12</text><text x="62" y="64">16 MiB/s</text>
  </g>
  <g>
    <rect x="84" y="236.5" width="72" height="103.5" rx="4" fill="#2168a8"/><rect x="224" y="108.9" width="72" height="231.1" rx="4" fill="#2168a8"/>
    <rect x="364" y="78.6" width="72" height="261.4" rx="4" fill="#2168a8"/><rect x="504" y="80.6" width="72" height="259.4" rx="4" fill="#7651a8"/>
    <rect x="644" y="78.6" width="72" height="261.4" rx="4" fill="#7651a8"/><rect x="784" y="79.1" width="72" height="260.9" rx="4" fill="#7651a8"/>
  </g>
  <g fill="#334b58" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">
    <text x="120" y="226">5.91</text><text x="260" y="99">13.21</text><text x="400" y="69">14.94</text>
    <text x="540" y="71">14.82</text><text x="680" y="69">14.94</text><text x="820" y="69">14.91</text>
    <text x="120" y="374">10 MiB</text><text x="260" y="374">100 MiB</text><text x="400" y="374">500 MiB</text>
    <text x="540" y="374">1 GiB</text><text x="680" y="374">2 GiB</text><text x="820" y="374">5 GiB</text>
  </g>
  <text x="450" y="416" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#62717c">Blue: synchronous. Purple: detached. Small files carry a larger fixed setup share.</text>
</svg>
