<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450" role="img" aria-labelledby="title desc">
  <title id="title">Projected hard timeout file-size envelope</title>
  <desc id="desc">The new wide-row regression projects 4.37 GiB for synchronous and 52.44 GiB for detached execution. Narrow-row projections are lower.</desc>
  <rect width="1000" height="450" rx="12" fill="#ffffff"/>
  <text x="40" y="35" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#152b3a">Projected hard-timeout envelope</text>
  <g font-family="system-ui,sans-serif" font-size="13" fill="#334b58">
    <text x="40" y="90">New wide · sync</text><text x="40" y="145">New wide · detached</text>
    <text x="40" y="200">New narrow · sync</text><text x="40" y="255">New narrow · detached</text>
    <text x="40" y="310">Prior narrow · sync</text><text x="40" y="365">Prior narrow · detached</text>
  </g>
  <g fill="#e7edf1">
    <rect x="205" y="70" width="700" height="25" rx="5"/><rect x="205" y="125" width="700" height="25" rx="5"/>
    <rect x="205" y="180" width="700" height="25" rx="5"/><rect x="205" y="235" width="700" height="25" rx="5"/>
    <rect x="205" y="290" width="700" height="25" rx="5"/><rect x="205" y="345" width="700" height="25" rx="5"/>
  </g>
  <rect x="205" y="70" width="58" height="25" rx="5" fill="#2168a8"/><rect x="205" y="125" width="699" height="25" rx="5" fill="#7651a8"/>
  <rect x="205" y="180" width="18" height="25" rx="5" fill="#2168a8"/><rect x="205" y="235" width="216" height="25" rx="5" fill="#7651a8"/>
  <rect x="205" y="290" width="14" height="25" rx="5" fill="#7d919d"/><rect x="205" y="345" width="170" height="25" rx="5" fill="#9aa8b0"/>
  <g font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#152b3a">
    <text x="920" y="89">4.37 GiB</text><text x="920" y="144">52.44 GiB</text><text x="920" y="199">1.35 GiB</text>
    <text x="920" y="254">16.18 GiB</text><text x="920" y="309">1.06 GiB</text><text x="920" y="364">12.78 GiB</text>
  </g>
  <text x="500" y="416" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#62717c">Planning extrapolation only. Demonstrated operational sizes remain 500 MiB sync and 5 GiB detached.</text>
</svg>
